name: Content Bridge
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs to fetch (comma-separated)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Content
        run: |
          mkdir -p "data/$(date +%Y-%m-%d)"
          D="data/$(date +%Y-%m-%d)"
          T=$(date +%H%M%S)

          # Reddit RSS
          for sub in MachineLearning programming rust golang; do
            curl -sL -H 'User-Agent: ContentBridge/1.0' \
              "https://www.reddit.com/r/$sub/.rss?limit=25" \
              > "$D/reddit-${sub}-${T}.rss" 2>/dev/null || true
          done

          # HN story IDs
          for t in top best new; do
            curl -sL -H 'User-Agent: ContentBridge/1.0' \
              "https://hacker-news.firebaseio.com/v0/${t}stories.json" \
              > "$D/hn-${t}-${T}.json" 2>/dev/null || true
          done

          # Custom URLs
          URLS="${{ github.event.inputs.urls }}"
          if [ -n "$URLS" ]; then
            IFS=',' read -ra UA <<< "$URLS"
            for u in "${UA[@]}"; do
              u=$(echo "$u" | xargs)
              s=$(echo "$u" | md5sum | cut -c1-8)
              curl -sL -H 'User-Agent: ContentBridge/1.0' "$u" \
                > "$D/custom-${s}-${T}.txt" 2>/dev/null || true
            done
          fi

          # Try Twitter/X via Nitter
          curl -sL -H 'User-Agent: ContentBridge/1.0' \
            'https://nitter.net/' \
            > "$D/nitter-${T}.html" 2>/dev/null || true

          # Summary
          echo "# Bridge $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$D/SUMMARY.md"
          ls -lh "$D/" >> "$D/SUMMARY.md"

      - name: Commit
        run: |
          git config user.name 'bridge[bot]'
          git config user.email 'bridge@bot.local'
          git add data/
          git diff --staged --quiet || git commit -m "🌉 $(date +%Y-%m-%d-%H%M)"
          git push
